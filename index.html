function tipoClass(t){return 'tipo-'+t.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z]/g,'')}
function statusLabel(k){var s=STATUS_FLUXO.find(function(x){return x.key===k});return s?s.label:k}
function vendaStatusLabel(k){var s=STATUS_VENDA.find(function(x){return x.key===k});return s?s.label:k}
function pagLabel(k){return k==='pendente'?'Pendente':k==='50_pago'?'50% Pago':k==='pago'?'Pago':k}
function interLabel(k){return{compra_magia:'Compra/Magia',consulta:'Consulta',prescricao:'Prescrição',ebo:'Ebó',pagamento:'Pagamento',observacao:'Observação'}[k]||k}
function cicloStatusLabel(k){return{ativo:'Ativo',concluido:'Concluído',cancelado:'Cancelado'}[k]||k}
function freteLabel(k){return{sedex:'Sedex',pac:'PAC',uber_envios:'Uber Envios','99':'99',retirada:'Retirada',outro:'Outro'}[k]||k}
function formatoConsultaLabel(v){return{presencial:'Presencial',online:'Videochamada'}[v]||v||'—'}
function tipoConsultaLabel(v){return{normal:'Normal',urgencia:'Urgência'}[v]||v||'—'}
function formaPagamentoLabel(v){return{pix_avista:'Pix',pix_50_50:'Pix',link_mercadopago:'Link Mercado Pago',cartao:'Cartão'}[v]||v||'—'}
function fmtDateTime(v){if(!v)return '';var d=new Date(v);if(isNaN(d))return '';return d.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}
function consultaConfirmacaoTexto(c){
var linhas=['Confirmação de consulta',c.nomeCompleto||''];
if(c.nomeMae)linhas.push('filho de '+c.nomeMae);
if(c.dataNascimento)linhas.push('Nascido em '+fmtDate(c.dataNascimento));
linhas.push('Data da consulta: '+fmtDate(c.dataConsulta));
linhas.push('Horário: '+(c.horarioConsulta?c.horarioConsulta.replace(':',' Horas'): '—'));
linhas.push('Formato: '+formatoConsultaLabel(c.formatoConsulta));
linhas.push('Modalidade: '+tipoConsultaLabel(c.tipoConsulta));
var pag='Pagamento: ';
if(c.statusPagamento==='pago')pag+='Efetuado';
else if(c.statusPagamento==='50_pago')pag+='50% pago';
else pag+='Pendente';
pag+=' via '+formaPagamentoLabel(c.formaPagamento);
if(c.createdAt)pag+=' no dia '+fmtDateTime(c.createdAt);
linhas.push(pag);
return linhas.join('\n');
}

// Debounced save for a specific table
// Save individual record - direct PATCH, no debounce
async function saveRecord(table,id,data){
try{

  var d = Object.assign({}, data);
  delete d.id;

  var resp = await sbPatch(table,'?id=eq.'+id,d);

  if(resp.ok){
    _lastSyncStatus = 'ok';

    // 🔴 ATUALIZA SOMENTE O STATE LOCAL (SEM LOAD GLOBAL)
    var idx = S[table].findIndex(function(x){ return x.id === id });

    if(idx !== -1){
      S[table][idx] = Object.assign({}, S[table][idx], d);
    }

    render();
  }
  else{
    _lastSyncStatus = 'error';
    toast('Erro ao salvar: '+resp.status,'error');
  }

}catch(e){
  _lastSyncStatus = 'offline';
  toast('Erro de conexão','error');
  console.log('[SAVE ERROR]', e);
}
}


// Insert new record and return with generated ID
async function insertRecord(table,data){
try{
  var d = Object.assign({}, data);
  delete d.id;

  var resp = await sbPost(table, d);

  if(resp.ok){
    var rows = await resp.json();
    _lastSyncStatus = 'ok';

    // ❌ REMOVIDO reloadTable (causa conflito de estado)

    return rows[0];
  }
  else{
    var errText = await resp.text();
    _lastSyncStatus = 'error';
    console.log('[INSERT] FAIL '+table+': '+resp.status+' '+errText);
    toast('Erro ao salvar '+table+': '+resp.status,'error');
    return null;
  }

}catch(e){
  _lastSyncStatus = 'offline';
  console.log('[INSERT] ERR '+table+':', e);
  toast('Erro de conexão ao salvar','error');
  return null;
}
}

  }catch(e){}

  _dbReady = true;
  _lastSyncStatus = 'ok';

  // Atualizar SECOES e TIPOS com valores do banco
  refreshSecoesETipos();

  console.log('[LOADALL COMPLETE]');

}catch(e){

  _lastSyncStatus = 'offline';
  _dbReady = false;
}
}

// Migrate local data to individual tables (one-time or on restore)
async function migrateToTables() {
  try {

    // Insert items
    for (var item of S.items) {
      var db = {nome:item.nome,tipo:item.tipo,secao:item.secao,localizacao:item.localizacao,observacoes:item.observacoes||''};
      var r = await insertRecord('items', db);
      if (r) item.id = r.id;
    }

    // Insert pessoas
    for (var p of S.pessoas) {
      var db = pessoaToDB(p);
      delete db.id;
      var r = await insertRecord('pessoas', db);
      if (r) p.id = r.id;
    }

    // Insert consulentes
    for (var c of S.consulentes) {
      var db = consToDB(c);
      db.pessoa_id = c.pessoaId || null;
      delete db.id;
      var r = await insertRecord('consulentes', db);
      if (r) c.id = r.id;
    }

    // Insert vendas
    for (var v of S.vendas) {
      var db = vendaToDB(v);
      delete db.id;
      var r = await insertRecord('vendas', db);
      if (r) v.id = r.id;
    }

    // Insert ciclos
    for (var ci of S.ciclos) {
      var db = cicloToDB(ci);
      delete db.id;
      var r = await insertRecord('ciclos', db);
      if (r) ci.id = r.id;
    }

    // Insert interacoes
    for (var it of S.interacoes) {
      var db = interToDB(it);
      delete db.id;
      var r = await insertRecord('interacoes', db);
      if (r) it.id = r.id;
    }

    // Insert crediarios
    for (var cr of S.crediarios) {
      var db = credToDB(cr);
      delete db.id;
      var r = await insertRecord('crediarios', db);
      if (r) cr.id = r.id;
    }

    console.log('[MIGRATE] Done');

  } catch (e) {
    console.log('[MIGRATE ERROR]', e);
  }
}

function compressImage(file,maxW,maxKB,cb){
maxW=maxW||400;maxKB=maxKB||50;

reader.onload=function(e){
var img=new Image();
img.onload=function(){
var w=img.width,h=img.height;

var canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;

var quality=0.7;var result=canvas.toDataURL('image/jpeg',quality);
// If still too big, reduce quality
if(result.length>maxKB*1370&&quality>0.3){quality=0.4;result=canvas.toDataURL('image/jpeg',quality)}
if(result.length>maxKB*1370&&w>200){w=200;h=Math.round(img.height*(200/img.width));canvas.width=w;canvas.height=h;ctx.drawImage(img,0,0,w,h);result=canvas.toDataURL('image/jpeg',0.5)}

  // 🔵 EDITOR: só Biblioteca, Estoque e Busca
  if(perfil === 'editor'){
    return ['busca','gerenciar','biblioteca'];
  }

  // 🔵 BASE (para outros perfis)
  var tabs = ['dashboard','busca','gerenciar','biblioteca'];

  // 🔹 Clientes
  if(hasRole(['admin','secretario','babalawo','assistente'])){
    tabs.push('clientes');
  }

  // 🔹 Dashboard de vendas
  if(hasRole(['admin','secretario','babalawo','assistente'])){
    tabs.push('dashboard_vendas');
  }

  // 🔹 Crediário
  if(hasRole(['admin','secretario','babalawo'])){
    tabs.push('crediario');
  }

  // 🔹 Relatórios / Backup / Usuários
  if(hasRole(['admin'])){
    tabs.push('rel_vendas','backup','usuarios');
  }

  // 🔹 Histórico
  if(hasRole(['admin','secretario','babalawo'])){
    tabs.push('historico');
  }

  return tabs;
}

var TIPOS_LIVRO=["Livro","Apostila","Revista"];
var SECOES_LIVRO=["Sala de Consulta do Bàbá","Prateleira das Esculturas","Prateleira dos Insumos","Estante com Medicinas perto do Banheiro","Estante com Apostilas perto do Banheiro","Andar de Cima"];

function getFilteredLivros(){var li=S.livros.slice();if(S.filterGenero)li=li.filter(function(l){return l.genero===S.filterGenero});if(S.filterTipoLivro)li=li.filter(function(l){return l.tipo===S.filterTipoLivro});if(S.filterSecaoLivro)li=li.filter(function(l){return l.secao===S.filterSecaoLivro});if(S.search.trim())li=li.filter(function(l){return fuzzy(S.search,l.nome+' '+l.autor+' '+l.genero+' '+l.secao)});return li}

function renderBibliotecaTable(pg,total){var pp=Math.ceil(total/S.perPage);var canEdit=hasRole(['admin','babalawo','assistente']);if(!pg.length)return '<div class="table-wrap"><div class="empty-state">Nenhum livro encontrado</div></div>';return '<div class="table-wrap"><div class="table-scroll"><table><thead><tr><th>Nome</th><th>Autor</th><th>Tipo</th><th>Gênero</th><th>Seção</th><th>Local</th>'+(canEdit?'<th>Ações</th>':'')+'</tr></thead><tbody>'+pg.map(function(l){return '<tr><td style="font-weight:500">'+esc(l.nome)+'</td><td>'+esc(l.autor)+'</td><td><span class="tipo-badge" style="background:var(--info-bg);color:var(--info)">'+esc(l.tipo)+'</span></td><td style="font-size:12px">'+esc(l.genero)+'</td><td style="font-size:12px">'+esc(l.secao)+'</td><td style="font-size:12px">'+esc(l.localizacao)+'</td>'+(canEdit?'<td><div class="actions-cell"><button class="edit-btn btn-sm" onclick="openEditLivro('+l.id+')">Editar</button><button class="del-btn btn-sm" onclick="confirmDelLivro('+l.id+')">X</button></div></td>':'')+'</tr>'}).join('')+'</tbody></table></div>'+(pp>1?renderPag(pp):'')+'</div>'}

function renderBiblioteca(){
var fi=getFilteredLivros(),pg=paginate(fi);
var canEdit=hasRole(['admin','babalawo','assistente']);
var go=GENEROS_LIVRO.map(function(g){return '<option value="'+esc(g)+'"'+(S.filterGenero===g?' selected':'')+'>'+esc(g)+'</option>'}).join('');
var to=TIPOS_LIVRO.map(function(t){return '<option value="'+esc(t)+'"'+(S.filterTipoLivro===t?' selected':'')+'>'+esc(t)+'</option>'}).join('');
var so=SECOES_LIVRO.map(function(s){return '<option value="'+esc(s)+'"'+(S.filterSecaoLivro===s?' selected':'')+'>'+esc(s)+'</option>'}).join('');
var stats='<div class="report-cards"><div class="report-card"><div class="rc-label">Total</div><div class="rc-value">'+S.livros.length+'</div></div>';
var tc={};S.livros.forEach(function(l){tc[l.tipo]=(tc[l.tipo]||0)+1});TIPOS_LIVRO.forEach(function(t){stats+='<div class="report-card" style="border-left-color:var(--info)"><div class="rc-label">'+t+'s</div><div class="rc-value">'+(tc[t]||0)+'</div></div>'});stats+='</div>';
return stats+'<div class="search-section"><div class="search-bar"><input class="search-input" placeholder="Buscar livro, autor..." value="'+esc(S.search)+'" id="searchInput"><button class="btn btn-primary" onclick="doSearch()">Buscar</button>'+(canEdit?'<button class="btn btn-success" onclick="openAddLivro()">+ Livro</button>':'')+'</div><div class="filters"><select onchange="S.filterGenero=this.value;S.page=1;render()"><option value="">Todos os gêneros</option>'+go+'</select><select onchange="S.filterTipoLivro=this.value;S.page=1;render()"><option value="">Todos os tipos</option>'+to+'</select><select onchange="S.filterSecaoLivro=this.value;S.page=1;render()"><option value="">Todas as seções</option>'+so+'</select></div><div class="result-count">'+fi.length+' de '+S.livros.length+'</div></div>'+renderBibliotecaTable(pg,fi.length)}

function renderSearch(ed){var fi=getFilteredItems(),pg=paginate(fi);var ab=ed?'<button class="btn btn-primary" onclick="openAddItem()">+ Item</button>':'';var so=SECOES.map(function(s){return '<option value="'+esc(s)+'"'+(S.filterSecao===s?' selected':'')+'>'+esc(s)+'</option>'}).join('');var to=TIPOS.map(function(t){return '<option value="'+esc(t)+'"'+(S.filterTipo===t?' selected':'')+'>'+esc(t)+'</option>'}).join('');return '<div class="search-section"><div class="search-bar"><input class="search-input" placeholder="Buscar item..." value="'+esc(S.search)+'" id="searchInput"><button class="btn btn-primary" onclick="doSearch()">Buscar</button>'+ab+'</div><div class="filters"><select onchange="S.filterSecao=this.value;S.page=1;render()"><option value="">Todas</option>'+so+'</select><select onchange="S.filterTipo=this.value;S.page=1;render()"><option value="">Todos</option>'+to+'</select></div><div class="result-count">'+fi.length+'</div></div>'+renderItemTable(pg,fi.length,ed)}
function renderItemTable(it,tot,ed){if(!it.length)return '<div class="table-wrap"><div class="empty-state">Nenhum</div></div>';var pp=Math.ceil(tot/S.perPage);return '<div class="table-wrap"><div class="table-scroll"><table><thead><tr><th>#</th><th>Nome</th><th>Tipo</th><th>Seção</th><th>Local</th>'+(ed?'<th>Ações</th>':'')+'</tr></thead><tbody>'+it.map(function(i){return '<tr><td>'+i.id+'</td><td style="font-weight:500">'+esc(i.nome)+'</td><td><span class="tipo-badge '+tipoClass(i.tipo)+'">'+esc(i.tipo)+'</span></td><td>'+esc(i.secao)+'</td><td>'+esc(i.localizacao)+'</td>'+(ed?'<td><div class="actions-cell"><button class="edit-btn btn-sm" onclick="openEditItem('+i.id+')">Editar</button><button class="del-btn btn-sm" onclick="confirmDel(\'item\','+i.id+')">X</button></div></td>':'')+'</tr>'}).join('')+'</tbody></table></div>'+(pp>1?renderPag(pp):'')+'</div>'}
function renderPag(pp){var b='',s=Math.max(1,S.page-3),e=Math.min(pp,S.page+3);if(S.page>1)b+='<button class="page-btn" onclick="S.page='+(S.page-1)+';render()">\u2039</button>';for(var i=s;i<=e;i++)b+='<button class="page-btn'+(i===S.page?' active':'')+'" onclick="S.page='+i+';render()">'+i+'</button>';if(S.page<pp)b+='<button class="page-btn" onclick="S.page='+(S.page+1)+';render()">\u203A</button>';return '<div class="pagination">'+b+'</div>'}
function renderRelatorios(){var bs={},bt={};SECOES.forEach(function(s){bs[s]=0});TIPOS.forEach(function(t){bt[t]=0});S.items.forEach(function(i){bs[i.secao]=(bs[i.secao]||0)+1;bt[i.tipo]=(bt[i.tipo]||0)+1});var mx=Math.max.apply(null,Object.values(bt).concat([1]));var cc='';SECOES.forEach(function(s){cc+='<div class="report-card"><div class="rc-label">'+esc(s)+'</div><div class="rc-value">'+(bs[s]||0)+'</div></div>'});var bars=TIPOS.map(function(t,i){return '<div class="bar-col"><div class="bar-value">'+(bt[t]||0)+'</div><div class="bar" style="height:'+Math.round((bt[t]/mx)*190)+'px;background:'+BAR_COLORS[i%BAR_COLORS.length]+'"></div><div class="bar-label">'+esc(t)+'</div></div>'}).join('');return '<div class="report-cards">'+cc+'</div><div class="chart-container"><div class="chart-title">Por tipo</div><div class="bar-chart">'+bars+'</div></div>'}

function renderClienteTable(pg,total){var pp=Math.ceil(total/S.perPage);return '<div class="table-wrap"><div class="table-scroll"><table><thead><tr><th>Nome</th><th>Tel</th><th>Origem</th><th>Ações</th></tr></thead><tbody>'+pg.map(function(p){return '<tr><td style="font-weight:500;cursor:pointer;color:var(--info)" onclick="goPerfil('+p.id+')">'+esc(p.nome)+'</td><td>'+esc(p.telefone||'\u2014')+'</td><td>'+esc(p.origem||'')+'</td><td><button class="edit-btn btn-sm" onclick="goPerfil('+p.id+')">Perfil</button></td></tr>'}).join('')+'</tbody></table></div>'+(pp>1?renderPag(pp):'')+'</div>'}
function renderClientes(){var fi=getFilteredPessoas(),pg=paginate(fi);return '<div class="search-section"><div class="search-bar"><input class="search-input" placeholder="Buscar..." value="'+esc(S.search)+'" id="searchInput"><button class="btn btn-primary" onclick="doSearch()">Buscar</button><button class="btn btn-primary" onclick="openAddPessoa()">+ Cliente</button></div><div class="result-count">'+fi.length+'</div></div>'+renderClienteTable(pg,fi.length)}

function renderPerfilCliente(){var p=getPessoa(S.viewPessoaId);if(!p)return '<div class="empty-state">?</div>';var ciclos=getCiclosPessoa(p.id);var consultas=getConsForPessoa(p.id);var vendas=getVendasForPessoa(p.id);
var h='<div style="margin-bottom:8px"><button class="btn btn-sm btn-outline" onclick="setTab(\'clientes\')">\u2190</button></div>';
h+='<div class="profile-card"><div class="profile-header">'+(p.foto?'<img src="'+p.foto+'" style="width:56px;height:56px;border-radius:50%;object-fit:cover">':'<div class="profile-avatar">'+esc(p.nome[0])+'</div>')+'<div><div class="profile-name">'+esc(p.nome)+'</div>'+(p.nomeMae?'<div style="font-size:13px;color:var(--text2)">Mãe: '+esc(p.nomeMae)+'</div>':'')+'<div class="profile-sub">'+esc(p.telefone||'')+' \u2022 '+esc(p.origem||'')+' \u2022 '+fmtDate(p.dataCriacao)+'</div></div></div>';
h+='<div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-sm btn-outline" onclick="openEditPessoa('+p.id+')">Editar</button><button class="btn btn-sm btn-success" onclick="startFlowFor('+p.id+',\'venda\')">+ Venda</button><button class="btn btn-sm btn-purple" onclick="startFlowFor('+p.id+',\'consulta\')">+ Consulta</button></div></div>';
// Consultas
if(consultas.length){h+='<div style="font-size:15px;font-weight:600;margin:8px 0">Consultas</div>';consultas.forEach(function(c){h+='<div class="cycle-card" style="border-left-color:var(--purple)"><div class="cycle-info"><h4>'+esc(c.nomeCompleto)+' <span class="status-badge st-'+c.statusFluxo+'">'+statusLabel(c.statusFluxo)+'</span></h4><div class="ci-sub">'+fmtDate(c.dataConsulta)+'</div></div><div class="actions-cell"><button class="btn btn-sm btn-outline" onclick="openViewCons('+c.id+')">Ver</button>'+(c.statusFluxo==='aguardando_prescricao'?'<button class="btn btn-sm btn-warning" onclick="if(!c.id){alert('ID não encontrado');console.log(c);return;}goPrescrPage('+c.id+')">Prescrição</button>':'')+'</div></div>'})}
// Vendas
if(vendas.length){h+='<div style="font-size:15px;font-weight:600;margin:8px 0">Vendas</div>';vendas.forEach(function(v){h+='<div class="cycle-card" style="border-left-color:var(--success)"><div class="cycle-info"><h4>#'+v.id+' <span class="status-badge st-'+v.status+'">'+vendaStatusLabel(v.status)+'</span></h4><div class="ci-sub">'+fmtDate(v.data)+' \u2022 R$'+(v.totalComFrete||0).toFixed(2)+'</div></div></div>'})}
return h}

function renderDetalheCiclo(){var c=getCiclo(S.viewCicloId);if(!c)return '';var p=getPessoa(c.pessoaId);var ints=getIntersCiclo(c.id);var h='<div style="margin-bottom:8px"><button class="btn btn-sm btn-outline" onclick="goPerfil('+c.pessoaId+')">\u2190</button></div><div class="profile-card"><div class="profile-name">Ciclo #'+c.id+'</div></div>';h+='<div class="timeline">';ints.forEach(function(it){h+='<div class="tl-item"><span style="font-size:12px;font-weight:600;color:var(--accent)">'+interLabel(it.tipo)+'</span> <span style="font-size:11px;color:var(--text3)">'+fmtDate(it.data)+'</span>'+(it.valor?' <span style="color:var(--success);font-weight:600">R$'+esc(it.valor)+'</span>':'')+'<div style="font-size:13px;margin-top:4px">'+esc(it.descricao||'')+'</div></div>'});h+='</div>';return h}

function renderNotificacoes(){var alerts=getPrescAlerts();var h='<div style="margin-bottom:12px"><button class="btn btn-primary" onclick="checkAlerts();toast(\'OK!\')">Verificar</button></div>';if(alerts.length){h+='<div class="chart-container"><div class="chart-title">Prescrições Pendentes</div>';alerts.forEach(function(a){h+='<div style="padding:6px;margin-bottom:4px;border-radius:6px;background:var(--warning-bg)">'+esc(a.consulente.nomeCompleto)+' - '+a.dias+'d</div>'});h+='</div>'}if(!S.notifications.length)h+='<div class="empty-state">Nenhuma</div>';else h+='<div class="table-wrap"><div class="table-scroll"><table><thead><tr><th>Tipo</th><th>Nome</th><th>Hora</th></tr></thead><tbody>'+S.notifications.slice(0,30).map(function(n){return '<tr><td>'+esc(n.tipo)+'</td><td>'+esc(n.nome)+'</td><td style="font-size:12px">'+esc(n.time)+'</td></tr>'}).join('')+'</tbody></table></div></div>';return h}
function renderRelVendas(){var now=new Date();var start=new Date(now-30*864e5).toISOString().slice(0,10),end=today();if(S.reportPeriod==='semanal')start=new Date(now-7*864e5).toISOString().slice(0,10);else if(S.reportPeriod==='trimestral')start=new Date(now-90*864e5).toISOString().slice(0,10);else if(S.reportPeriod==='semestral')start=new Date(now-180*864e5).toISOString().slice(0,10);var vendas=S.vendas.filter(function(v){return v.data>=start&&v.data<=end});var tv=0;vendas.forEach(function(v){tv+=(v.totalComFrete||0)});return '<div class="search-section"><div class="filters"><select onchange="S.reportPeriod=this.value;render()"><option value="semanal"'+(S.reportPeriod==='semanal'?' selected':'')+'>Semanal</option><option value="mensal"'+(S.reportPeriod==='mensal'?' selected':'')+'>Mensal</option><option value="trimestral"'+(S.reportPeriod==='trimestral'?' selected':'')+'>Trimestral</option><option value="semestral"'+(S.reportPeriod==='semestral'?' selected':'')+'>Semestral</option></select></div></div><div class="report-cards"><div class="report-card"><div class="rc-label">Vendas</div><div class="rc-value">'+vendas.length+'</div></div><div class="report-card"><div class="rc-label">Total</div><div class="rc-value">R$'+tv.toFixed(0)+'</div></div></div>'}
function renderUsuarios(){if(!S._authUsersLoaded&&!S._loadingUsers)setTimeout(loadUsuarios,0);var h='<div style="margin-bottom:12px"><button class="btn btn-primary" onclick="openAddUser()">+ Usuário</button><button class="btn btn-outline" onclick="loadUsuarios()" style="margin-left:8px">Atualizar Lista</button></div>';if(S._loadingUsers){h+='<div class="empty-state">Carregando usuários...</div>';return h}if(!S._authUsers||!S._authUsers.length){h+='<div class="empty-state">Nenhum usuário encontrado no Supabase.<br><button class="btn btn-sm btn-info" onclick="loadUsuarios()">Carregar</button></div>';return h}S._authUsers.forEach(function(u){var title=u.email||'Usuario';h+='<div class="user-card"><div class="user-info"><div class="user-avatar avatar-'+u.perfil+'">'+title.charAt(0).toUpperCase()+'</div><div><div style="font-weight:500">'+esc(title)+'</div><div style="font-size:12px;color:var(--text2)">'+u.perfil+'</div><div style="font-size:11px;color:var(--text3)">'+esc(u.email||'')+'</div></div></div><div style="display:flex;gap:6px"><button class="btn btn-sm btn-outline" onclick="openChgPwd(\''+esc(u.email||'')+'\')">Nova Senha</button></div></div>'});return h}
function renderHistorico(){
if(!S.history.length)return '<div class="empty-state">Nenhum registro</div>';
var users={};S.history.forEach(function(h){users[h.user]=1});var uList=Object.keys(users).sort();
var fu=S.filterHistUser||'';var fq=S.filterHistQuery||'';
var filtered=S.history.filter(function(h){
if(fu&&h.user!==fu)return false;
if(fq&&!fuzzy(fq,h.action+' '+h.user+' '+h.time))return false;
return true});
var h='<div class="search-section"><div class="search-bar"><select id="histUserFilter" onchange="S.filterHistUser=this.value;render()" style="padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--bg3)"><option value="">Todos os usuários</option>'+uList.map(function(u){return '<option value="'+esc(u)+'"'+(fu===u?' selected':'')+'>'+esc(u)+'</option>'}).join('')+'</select><input class="search-input" placeholder="Buscar ação..." value="'+esc(fq)+'" id="histSearchInput" oninput="S.filterHistQuery=this.value;render()" style="max-width:250px"></div><div class="result-count">'+filtered.length+' registros</div></div>';
var page=S.histPage||1;var perPage=50;var total=Math.ceil(filtered.length/perPage);var paged=filtered.slice((page-1)*perPage,page*perPage);
h+='<div class="table-wrap"><div class="table-scroll"><table><thead><tr><th>Data/Hora</th><th>Usuário</th><th>Ação</th></tr></thead><tbody>'+paged.map(function(r){
var isLogin=r.action==='Login';var isLogout=r.action==='Logout';
var rowStyle=isLogin?' style="background:var(--success-bg)"':isLogout?' style="background:var(--warning-bg)"':'';
return '<tr'+rowStyle+'><td style="color:var(--text3);font-size:12px;white-space:nowrap">'+esc(r.time)+'</td><td><span style="font-weight:600;color:var(--accent)">'+esc(r.user)+'</span></td><td style="font-weight:500">'+(isLogin?'\u{1F7E2} ':isLogout?'\u{1F534} ':'')+esc(r.action)+'</td></tr>'}).join('')+'</tbody></table></div>';

window.finishVenda=async function(){
var p=getPessoa(S.flowPessoaId);if(!p)return;
var items=S.vendaItems.filter(function(it){return it.nome.trim()});
if(!items.length)return toast('Adicione itens!','error');
for(var vi=0;vi<items.length;vi++){var verr=runValidation([validateText(items[vi].nome,1,200,'Item '+(vi+1)),validateNumber(items[vi].qtd,1,9999,'Qtd item '+(vi+1)),validateNumber(items[vi].valorUnit,0,999999,'Valor item '+(vi+1))]);if(verr)return toast(verr,'error')}
items.forEach(function(it){it.valorTotal=it.qtd*(it.valorUnit||0)});
var subtotal=0;items.forEach(function(it){subtotal+=it.valorTotal});
var freteVal=parseFloat(document.getElementById('vFreteVal').value)||0;
var total=subtotal+freteVal;
var v={id:nid(S.vendas),pessoaId:S.flowPessoaId,data:today(),itens:items,subtotal:subtotal,valorFrete:freteVal,totalComFrete:total,tipoFrete:document.getElementById('vFrete').value,formaPagamento:document.getElementById('vPag').value,status:'pedido_feito',codigoRastreio:'',comprovante:''};
var dbv=await insertRecord('vendas',vendaToDB(v));if(dbv)v.id=dbv.id;S.vendas.push(v);
// Create ciclo + interaction
var c={id:nid(S.ciclos),pessoaId:S.flowPessoaId,tipo:'compra',dataInicio:today(),dataFim:'',status:'ativo',observacoes:''};S.ciclos.push(c);
S.interacoes.push({id:nid(S.interacoes),cicloId:c.id,tipo:'compra_magia',data:today(),descricao:items.map(function(it){return it.qtd+'x '+it.nome}).join(', '),valor:total.toFixed(2),formaPagamento:v.formaPagamento,status:'',criadoPor:currentUserEmail()});
// Alert
sendWhats('pedido_feito',{Nome:p.nome,Endereco:endCompleto(p),Itens:items.map(function(it){return it.qtd+'x '+it.nome}).join(', '),Total:'R$'+total.toFixed(2)});
addHistDB('Venda #'+v.id+' R$'+total.toFixed(2));toast('Venda registrada!');closeModal();S.activeTab='dashboard_vendas';render()};

(async function () {

// Init Supabase client
initSupabase();

// Try to restore Auth session
if (_sb) {
  try {
    var session = await authGetSession();

    if (session) {
      var user = await authGetUser();

      if (user && user.user_metadata) {
        S.currentUser = {
          email: user?.email || '',
          perfil: user?.user_metadata?.perfil || 'viewer',
          authUser: user
        };

        console.log('[AUTH] Session restored: ' + S.currentUser.email);
      }
    }

  } catch (e) {
    console.log('[AUTH] Session restore failed:', e);
  }
}

// Auth state listener
_sb.auth.onAuthStateChange(function (event, session) {
  if (event === 'SIGNED_OUT') {
    S.currentUser = null;
    render();
  }

  if (event === 'TOKEN_REFRESHED') {
    console.log('[AUTH] Token refreshed');
  }
});

if(S.currentUser&&S.currentUser.authUser&&!S.currentUser.email)S.currentUser.email=S.currentUser.authUser.email||'';
