<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ilé Ifagbemi Brasil — Redefinir Senha</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F7F5F0;--bg2:#EDEAE3;--bg3:#fff;--text:#2C2A25;--text2:#6B6860;--text3:#9E9B93;--accent:#8B6914;--accent2:#B8860B;--accent-bg:#FDF6E3;--border:#D4D0C8;--radius:10px;--radius-lg:14px;--shadow:0 2px 12px rgba(44,42,37,0.08);--shadow-lg:0 8px 32px rgba(44,42,37,0.12);--danger:#C0392B;--danger-bg:#FDEDEC;--success:#27AE60;--success-bg:#E8F8F0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
button,input{font-family:inherit}
.page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--bg3);border-radius:var(--radius-lg);padding:40px 36px;width:100%;max-width:430px;box-shadow:var(--shadow-lg)}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.brand-mark{font-size:34px}
.brand h1{font-family:'Playfair Display',serif;font-size:28px;color:var(--accent);line-height:1.1}
.subtitle{color:var(--text2);font-size:14px;line-height:1.6;margin-bottom:22px}
.panel{background:var(--accent-bg);border-radius:var(--radius);padding:14px 16px;margin-bottom:18px;font-size:13px;color:var(--text2);line-height:1.6}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px}
.input-wrap{position:relative}
.input-wrap input{width:100%;padding:11px 44px 11px 14px;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--bg);font-size:14px}
.input-wrap input:focus{outline:none;border-color:var(--accent)}
.eye-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);border:none;background:none;color:var(--text3);font-size:18px;cursor:pointer}
.btn{width:100%;padding:12px 16px;border:none;border-radius:var(--radius);font-weight:600;font-size:15px;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.msg{padding:10px 12px;border-radius:var(--radius);font-size:13px;line-height:1.5;margin-bottom:14px;display:none}
.msg-error{background:var(--danger-bg);color:var(--danger)}
.msg-success{background:var(--success-bg);color:var(--success)}
.footer{margin-top:16px;font-size:12px;color:var(--text3);text-align:center}
.link{color:var(--accent);text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="page">
  <div class="card">
    <div class="brand">
      <div class="brand-mark">🏛️</div>
      <h1>Ilé Ifagbemi Brasil</h1>
    </div>
    <p class="subtitle">Defina uma nova senha para concluir a recuperação de acesso.</p>
    <div class="panel" id="statusPanel">Validando link de redefinição...</div>
    <div class="msg msg-error" id="errorBox"></div>
    <div class="msg msg-success" id="successBox"></div>
    <form id="resetForm" style="display:none">
      <div class="form-group">
        <label for="newPassword">Nova senha</label>
        <div class="input-wrap">
          <input id="newPassword" type="password" placeholder="Digite a nova senha" autocomplete="new-password">
          <button class="eye-btn" type="button" data-target="newPassword">👁️</button>
        </div>
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirmar nova senha</label>
        <div class="input-wrap">
          <input id="confirmPassword" type="password" placeholder="Repita a nova senha" autocomplete="new-password">
          <button class="eye-btn" type="button" data-target="confirmPassword">👁️</button>
        </div>
      </div>
      <button class="btn btn-primary" id="submitBtn" type="submit">Salvar nova senha</button>
    </form>
    <div class="footer">
      Depois de concluir, você pode voltar para o <a class="link" href="./index.html">sistema</a>.
    </div>
  </div>
</div>

<script>
var SUPABASE_URL='https://pbizmuonubskyfwzxwhn.supabase.co';
var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiaXptdW9udWJza3lmd3p4d2huIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NDIzODMsImV4cCI6MjA5MTMxODM4M30.ayYTdC3-dTaa2L3wYq7a-Eai9lyJq2KNGrtONm3hw4s';
var sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{autoRefreshToken:true,persistSession:true,detectSessionInUrl:true}});
var form=document.getElementById('resetForm');
var submitBtn=document.getElementById('submitBtn');
var statusPanel=document.getElementById('statusPanel');
var errorBox=document.getElementById('errorBox');
var successBox=document.getElementById('successBox');

function showError(msg){
  errorBox.textContent=msg;
  errorBox.style.display='block';
}
function clearError(){
  errorBox.textContent='';
  errorBox.style.display='none';
}
function showSuccess(msg){
  successBox.textContent=msg;
  successBox.style.display='block';
}
function setStatus(msg){
  statusPanel.textContent=msg;
}
function toggleForm(show){
  form.style.display=show?'block':'none';
}
async function prepareRecoverySession(){
  try{
    var params=new URLSearchParams(window.location.search);
    var code=params.get('code');
    if(code){
      var exchange=await sb.auth.exchangeCodeForSession(code);
      if(exchange.error)throw exchange.error;
      window.history.replaceState({},document.title,window.location.pathname);
    }
    var sessionRes=await sb.auth.getSession();
    if(sessionRes.error)throw sessionRes.error;
    if(sessionRes.data.session){
      setStatus('Link confirmado. Agora defina sua nova senha.');
      toggleForm(true);
      return;
    }
    setStatus('Não foi possível validar este link automaticamente.');
    showError('Abra novamente o link enviado por email e tente mais uma vez.');
  }catch(e){
    setStatus('Link inválido ou expirado.');
    showError(e && e.message ? e.message : 'Não foi possível validar o link de redefinição.');
  }
}

document.querySelectorAll('.eye-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    var input=document.getElementById(btn.getAttribute('data-target'));
    if(!input)return;
    input.type=input.type==='password'?'text':'password';
  });
});

form.addEventListener('submit',async function(e){
  e.preventDefault();
  clearError();
  successBox.style.display='none';
  var password=document.getElementById('newPassword').value;
  var confirm=document.getElementById('confirmPassword').value;
  if(!password)return showError('Digite a nova senha.');
  if(password.length<6)return showError('A senha deve ter no mínimo 6 caracteres.');
  if(password!==confirm)return showError('As senhas não coincidem.');
  submitBtn.disabled=true;
  submitBtn.textContent='Salvando...';
  try{
    var res=await sb.auth.updateUser({password:password});
    if(res.error)throw res.error;
    setStatus('Senha redefinida com sucesso.');
    showSuccess('Sua nova senha foi salva. Você já pode voltar para o sistema e entrar normalmente.');
    toggleForm(false);
  }catch(err){
    showError(err && err.message ? err.message : 'Erro ao salvar a nova senha.');
  }finally{
    submitBtn.disabled=false;
    submitBtn.textContent='Salvar nova senha';
  }
});

sb.auth.onAuthStateChange(function(event){
  if(event==='PASSWORD_RECOVERY' || event==='SIGNED_IN'){
    setStatus('Link confirmado. Agora defina sua nova senha.');
    toggleForm(true);
  }
});

prepareRecoverySession();
</script>
</body>
</html>
